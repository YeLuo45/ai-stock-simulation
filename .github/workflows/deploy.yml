name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_DEMO_MODE: 'true'

      - name: Deploy to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          echo "Current dir: $(pwd)"
          echo "Dist contents:"
          ls -la dist/ || echo "dist not found"
          echo "Workspace: $GITHUB_WORKSPACE"
          ls -la $GITHUB_WORKSPACE/

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          WORKSPACE="$GITHUB_WORKSPACE"
          echo "Workspace is: $WORKSPACE"

          # Check if gh-pages remote branch exists
          if git ls-remote --heads origin gh-pages | grep -q gh-pages; then
            echo "Fetching existing gh-pages..."
            git fetch origin gh-pages:gh-pages
            git checkout gh-pages
            git pull origin gh-pages || true
          else
            echo "Creating new gh-pages..."
            git checkout --orphan gh-pages
          fi

          # Remove old content
          echo "Current gh-pages contents before cleanup:"
          ls -la

          # Remove everything except .git
          find . -maxdepth 1 ! -name '.git' ! -name '.' -exec rm -rf {} + 2>/dev/null || true

          # Copy build output from workspace
          echo "Copying dist from $WORKSPACE/dist to $(pwd)"
          cp -r "$WORKSPACE/dist" .
          cp -r "$WORKSPACE/dist/." .
          ls -la

          # Commit and push
          git add .
          git status
          git commit -m "Deploy $(date +%Y%m%d-%H%M%S)"
          git push origin gh-pages --force

          echo "Deployed to gh-pages"
